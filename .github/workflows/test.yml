name: Security & Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate OpenAI key format (if set)
        run: |
          python -c "
          import os, sys
          key = os.environ.get('OPENAI_API_KEY', '')
          if key:
              if not key.startswith('sk-'):
                  print('::error::OPENAI_API_KEY does not start with sk-')
                  sys.exit(1)
              if len(key) < 30:
                  print('::error::OPENAI_API_KEY appears too short / possibly expired')
                  sys.exit(1)
              print('OpenAI key format OK')
          else:
              print('No OPENAI_API_KEY set; AI tests will use local fallback')
          "

      - name: Run security tests
        run: pytest tests/test_security.py -v --tb=short

      - name: Run full test suite
        run: pytest tests/ -v --tb=short
